<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Generator 🐾</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🐾 Random Pet Generator</h1>

        <div class="card">
            <h2>🐱 Cat Fact</h2>
            <p id="result">Click to generate a fact</p>
            <button id="factBtn">Generate Fact</button>
        </div>

        <div class="card">
            <h2>🐶 Dog Image</h2>
            <img id="resultImg" src="" alt="Dog Image">
            <button id="imgBtn">Show Image</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
